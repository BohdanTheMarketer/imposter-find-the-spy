name: ImposterGame
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 11.0.0
options:
  bundleIdPrefix: com.imposter
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
schemes:
  ImposterGame:
    build:
      targets:
        ImposterGame: all
    run:
      config: Debug
      commandLineArguments:
        "-FIRDebugEnabled": true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "3"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIAppFonts:
      - LibreBaskerville-Regular.ttf
      - LibreBaskerville-Medium.ttf
      - LibreBaskerville-SemiBold.ttf
      - LibreBaskerville-Bold.ttf
      - LibreBaskerville-Italic.ttf
      - LibreBaskerville-MediumItalic.ttf
      - LibreBaskerville-SemiBoldItalic.ttf
      - LibreBaskerville-BoldItalic.ttf
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_CFBundleIconName: AppIcon
  configs:
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
targets:
  ImposterGame:
    type: application
    platform: iOS
    sources:
      - path: ImposterGame
    dependencies:
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseInstallations
    postBuildScripts:
      - name: Firebase Crashlytics
        basedOnDependencyAnalysis: false
        script: |
          "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
        inputFiles:
          - ${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${TARGET_NAME}
          - $(BUILT_PRODUCTS_DIR)/$(INFOPLIST_PATH)
    resources:
      - path: ImposterGame/Assets.xcassets
        buildPhase: resources
      - path: ImposterGame/Resources/WordPacks
        buildPhase: resources
      - path: ImposterGame/Resources/Onboarding
        buildPhase: resources
      - path: ImposterGame/Resources/PlayerAvatars
        buildPhase: resources
      - path: ImposterGame/Resources/CategoryIcons
        buildPhase: resources
      - path: ImposterGame/Resources/Fonts/LibreBaskerville-Regular.ttf
        buildPhase: resources
      - path: ImposterGame/Resources/Fonts/LibreBaskerville-Medium.ttf
        buildPhase: resources
      - path: ImposterGame/Resources/Fonts/LibreBaskerville-SemiBold.ttf
        buildPhase: resources
      - path: ImposterGame/Resources/Fonts/LibreBaskerville-Bold.ttf
        buildPhase: resources
      - path: ImposterGame/Resources/Fonts/LibreBaskerville-Italic.ttf
        buildPhase: resources
      - path: ImposterGame/Resources/Fonts/LibreBaskerville-MediumItalic.ttf
        buildPhase: resources
      - path: ImposterGame/Resources/Fonts/LibreBaskerville-SemiBoldItalic.ttf
        buildPhase: resources
      - path: ImposterGame/Resources/Fonts/LibreBaskerville-BoldItalic.ttf
        buildPhase: resources
      - path: ImposterGame/Resources/Assets.xcassets
        buildPhase: resources
      - path: ImposterGame/GoogleService-Info.plist
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.danetka.Danetka
        DEVELOPMENT_TEAM: Q35PSLMDJH
        INFOPLIST_KEY_CFBundleDisplayName: "Imposter"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
